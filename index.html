<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maria Buciu - Portfolio</title>
    <style>
        /* Light Mode Settings */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffb6c1; 
            background-image: radial-gradient(rgba(255,255,255,0.4) 1.5px, transparent 0), 
                              linear-gradient(45deg, transparent 45%, rgba(255,255,255,0.15) 45%, rgba(255,255,255,0.15) 55%, transparent 55%);
            background-size: 30px 30px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 120vh; /* Made slightly taller to guarantee the scrollbar works! */
            transition: background-color 0.3s;
            padding: 60px 0; 
            overflow-x: hidden; 
        }

        /* NEW Feature 1: The Altimeter Scroll Bar */
        #altimeter-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 6px;
            background-color: #00ffcc; /* Glowing aviation cyan */
            width: 0%;
            z-index: 9999;
            box-shadow: 0 2px 10px rgba(0, 255, 204, 0.6);
            transition: width 0.1s ease-out;
        }

        .card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
            transition: background-color 0.3s, color 0.3s;
            z-index: 10; 
            position: relative;
        }
        
        .avatar {
            width: 100px;
            height: 100px;
            background: #ffecf0;
            border: 3px solid #d81b60;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5em;
            box-shadow: 0 5px 10px rgba(216, 27, 96, 0.2);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); 
            cursor: pointer;
        }
        .avatar:hover {
            transform: translate(30px, -40px) scale(1.2) rotate(-25deg);
            box-shadow: -15px 25px 20px rgba(216, 27, 96, 0.3);
        }

        h1 { margin: 0 0 5px 0; color: #d81b60; font-size: 1.8em; }
        .subtitle { color: #ff5c8a; font-weight: bold; margin: 0 0 15px 0; font-size: 1.1em; }

        .zulu-clock {
            background-color: #333;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.2em;
            letter-spacing: 2px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
            border: 2px solid #222;
        }

        /* NEW Feature 2: Terminal Typing Bio */
        .bio { 
            line-height: 1.6; 
            margin-bottom: 30px; 
            font-size: 0.95em; 
            color: #444; 
            text-align: left;
            min-height: 120px; /* Keeps the page from jumping while typing */
            font-family: monospace; /* Gives it that computer terminal look */
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #333;
        }
        .cursor {
            animation: blink 1s step-end infinite;
            font-weight: bold;
            color: #d81b60;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* NEW Feature 3: The Radar Sweep */
        .radar-box {
            background-color: #111;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin: 0 auto 25px auto;
            position: relative;
            overflow: hidden;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }
        .radar-box::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            /* The conic gradient creates the fading green sweep */
            background: conic-gradient(from 0deg, transparent 70%, rgba(0, 255, 204, 0.9) 100%);
            transform-origin: 0 0;
            animation: sweep 2s linear infinite;
        }
        @keyframes sweep { 100% { transform: rotate(360deg); } }
        .radar-box::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent 49%, #00ffcc 50%, transparent 51%),
                        linear-gradient(0deg, transparent 49%, #00ffcc 50%, transparent 51%);
            opacity: 0.3;
            border-radius: 50%;
        }

        .contact-tower {
            text-align: left;
            background-color: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #007bff; 
            margin-bottom: 25px;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.03);
        }
        .contact-tower h3 { color: #007bff; margin-top: 0; margin-bottom: 12px;}
        .contact-tower p { margin-top: 0; font-size: 0.9em; color: #555; line-height: 1.5; }
        
        .email-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #e9ecef;
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .email-text { font-family: monospace; font-size: 1em; color: #333; font-weight: bold; }
        .copy-btn {
            background-color: #007bff; color: white; border: none; padding: 6px 12px;
            border-radius: 4px; cursor: pointer; font-weight: bold; transition: background-color 0.2s;
        }
        .copy-btn:hover { background-color: #0056b3; }

        .links { margin-bottom: 20px; }
        .links a {
            display: inline-block; margin: 5px; padding: 10px 24px;
            background-color: #d81b60; color: white; text-decoration: none;
            border-radius: 25px; font-weight: bold; transition: all 0.2s;
        }
        .links a:hover { background-color: #ad1457; transform: translateY(-2px); }
        
        #theme-btn {
            padding: 10px 20px; border: 2px solid #d81b60; border-radius: 25px;
            background-color: transparent; color: #d81b60; cursor: pointer;
            font-weight: bold; transition: all 0.3s;
        }
        #theme-btn:hover { background-color: #d81b60; color: white; }

        /* Dark Mode Settings */
        body.dark-mode { background-color: #1a1a1a; background-image: none; }
        body.dark-mode .card { background-color: #2d2d2d; color: #ffffff; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        body.dark-mode h1 { color: #ff8da1; }
        body.dark-mode .subtitle { color: #ffb6c1; }
        body.dark-mode .bio { background-color: #222; color: #00ffcc; border-left-color: #00ffcc;}
        body.dark-mode .cursor { color: #00ffcc; }
        body.dark-mode .avatar { background: #3d3d3d; border-color: #ff8da1; }
        body.dark-mode .zulu-clock { color: #ffb000; border-color: #111; } 
        body.dark-mode .contact-tower { background-color: #333; border-left-color: #4da3ff; box-shadow: none; }
        body.dark-mode .contact-tower h3 { color: #4da3ff; }
        body.dark-mode .contact-tower p { color: #ccc; }
        body.dark-mode .email-box { background-color: #222; border-color: #555; }
        body.dark-mode .email-text { color: #4da3ff; }
        body.dark-mode #theme-btn { border-color: #ff8da1; color: #ff8da1; }
        body.dark-mode #theme-btn:hover { background-color: #ff8da1; color: #2d2d2d; }

        /* Easter Egg Animation Settings */
        #secret-plane {
            position: fixed; bottom: 10%; left: -200px; font-size: 6em;
            z-index: 9999; pointer-events: none; opacity: 0; transition: opacity 0.2s;
        }
        .fly-animation { animation: flyAcross 4s cubic-bezier(0.4, 0, 0.2, 1) forwards; opacity: 1 !important; }
        @keyframes flyAcross {
            0% { transform: translateX(0) translateY(0) rotate(15deg) scale(1); }
            30% { transform: translateX(40vw) translateY(-20vh) rotate(-5deg) scale(1.5); }
            60% { transform: translateX(80vw) translateY(-10vh) rotate(5deg) scale(2); }
            100% { transform: translateX(130vw) translateY(-40vh) rotate(-15deg) scale(1); }
        }
    </style>
</head>
<body>

    <div id="altimeter-bar"></div>

    <div id="secret-plane">🛩️</div>

    <div class="card">
        <div class="avatar">✈️</div>
        
        <h1>Maria Buciu</h1>
        <p class="subtitle">Future Aerospace Engineer</p>
        
        <div id="zulu-clock" class="zulu-clock">00:00:00 Z</div>

        <div class="radar-box"></div>
        
        <p class="bio" id="terminal-bio"></p>

        <div class="contact-tower">
            <h3>📧 Contact</h3>
            <p>Ready to collaborate? Copy my frequency below to open a channel.</p>
            <div class="email-box">
                <span class="email-text">buciumaria04@gmail.com</span>
                <button onclick="copyEmail()" id="copy-btn" class="copy-btn">Copy</button>
            </div>
        </div>

        <div class="links">
            <a href="https://github.com/mariabuciu" target="_blank">GitHub</a>
            <a href="https://www.linkedin.com/in/maria-buciu/" target="_blank">LinkedIn</a>
        </div>
        
        <button id="theme-btn" onclick="toggleDarkMode()">Toggle Dark Mode</button>
    </div>

    <script>
        // 1. Dark Mode Toggle
        function toggleDarkMode() {
            document.body.classList.toggle("dark-mode");
            const button = document.getElementById("theme-btn");
            if (document.body.classList.contains("dark-mode")) {
                button.innerText = "Toggle Light Mode";
            } else {
                button.innerText = "Toggle Dark Mode";
            }
        }

        // 2. Zulu Clock Logic
        function updateZuluClock() {
            const now = new Date();
            const hours = String(now.getUTCHours()).padStart(2, '0');
            const minutes = String(now.getUTCMinutes()).padStart(2, '0');
            const seconds = String(now.getUTCSeconds()).padStart(2, '0');
            document.getElementById('zulu-clock').innerText = hours + ':' + minutes + ':' + seconds + ' Z';
        }
        updateZuluClock(); 
        setInterval(updateZuluClock, 1000); 

        // 3. Comms Array Copy Button
        function copyEmail() {
            // Change this to your real email!
            const myEmail = "buciumaria04@gmail.com";
            navigator.clipboard.writeText(myEmail).then(() => {
                const btn = document.getElementById("copy-btn");
                btn.innerText = "Copied! ✔️";
                btn.style.backgroundColor = "#28a745"; 
                setTimeout(() => {
                    btn.innerText = "Copy";
                    btn.style.backgroundColor = ""; 
                }, 2000);
            });
        }

        // 4. Easter Egg Key Logger
        let keyBuffer = ""; 
        document.addEventListener("keydown", function(event) {
            keyBuffer += event.key.toUpperCase();
            if (keyBuffer.length > 3) keyBuffer = keyBuffer.substring(keyBuffer.length - 3);
            if (keyBuffer === "FLY") {
                const plane = document.getElementById("secret-plane");
                plane.classList.add("fly-animation");
                setTimeout(() => {
                    plane.classList.remove("fly-animation");
                    keyBuffer = ""; 
                }, 4500);
            }
        });

        // NEW 5. Altimeter Scroll Bar Logic
        window.onscroll = function() {
            // Calculate how far down the page the user has scrolled
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (winScroll / height) * 100;
            // Update the width of the cyan bar at the top!
            document.getElementById("altimeter-bar").style.width = scrolled + "%";
        };

        // NEW 6. Terminal Typing Effect
        const bioText = "Hello! I am a third-year student at the Faculty of Aerospace Engineering at UPB, with a special interest in Air Navigation. I am also a beginner developer currently learning Git, GitHub, and web technologies. I love solving problems and building things from scratch. Welcome to my coding journey!";
        const bioElement = document.getElementById("terminal-bio");
        let i = 0;

        function typeWriter() {
            if (i < bioText.length) {
                // Type out one letter at a time, keeping the blinking cursor at the end
                bioElement.innerHTML = bioText.substring(0, i+1) + '<span class="cursor">|</span>';
                i++;
                setTimeout(typeWriter, 35); // 35 milliseconds per letter
            }
        }
        // Wait half a second after the page loads, then start typing!
        setTimeout(typeWriter, 500); 

    </script>
</body>
</html>
